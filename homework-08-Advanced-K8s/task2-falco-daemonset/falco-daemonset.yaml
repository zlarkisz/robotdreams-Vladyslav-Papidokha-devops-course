# =============================================================================
# DaemonSet для Falco — інструмент моніторингу безпеки
# DaemonSet гарантує, що Falco запущений на КОЖНІЙ ноді кластера
# =============================================================================

# Версія Kubernetes API для DaemonSet
# apps/v1 — група API для додатків (Deployment, StatefulSet, DaemonSet)
apiVersion: apps/v1

# Тип ресурсу — DaemonSet
# Забезпечує: рівно 1 под на кожній ноді кластера
kind: DaemonSet

# -----------------------------------------------------------------------------
# METADATA — ідентифікація ресурсу
# -----------------------------------------------------------------------------
metadata:
  # Ім'я DaemonSet
  name: falco
  # Namespace — розміщуємо в kube-system (системні компоненти)
  namespace: kube-system
  # Labels для організації та пошуку
  labels:
    app: falco

# -----------------------------------------------------------------------------
# SPEC — бажаний стан DaemonSet
# -----------------------------------------------------------------------------
spec:
  # Selector — як DaemonSet знаходить "свої" поди
  selector:
    matchLabels:
      app: falco

  # ---------------------------------------------------------------------------
  # TEMPLATE — шаблон для створення подів
  # ---------------------------------------------------------------------------
  template:
    metadata:
      # Labels пода — мають співпадати з selector.matchLabels
      labels:
        app: falco

    spec:
      # -------------------------------------------------------------------------
      # SECURITY CONTEXT — привілеї пода
      # Falco потребує доступу до ядра системи для моніторингу syscalls
      # -------------------------------------------------------------------------

      # Привілейований режим — доступ до всіх ресурсів хост-системи
      # УВАГА: Це небезпечно для звичайних додатків!
      # Falco потребує цього для читання syscalls через eBPF/kernel module
      hostPID: true # Доступ до процесів хоста (бачить всі PID)
      hostNetwork: true # Доступ до мережі хоста

      # -------------------------------------------------------------------------
      # CONTAINERS — контейнери в поді
      # -------------------------------------------------------------------------
      containers:
        - name: falco
          # Офіційний образ Falco
          # falcosecurity/falco-no-driver — версія без kernel module
          # Працює через eBPF (сучасний підхід)
          image: falcosecurity/falco-no-driver:latest

          # Привілейований контейнер — повний доступ до хоста
          securityContext:
            privileged: true

          # -------------------------------------------------------------------
          # RESOURCE LIMITS — обмеження ресурсів
          # Щоб Falco не "з'їв" всі ресурси ноди
          # -------------------------------------------------------------------
          resources:
            # requests — мінімум, який Kubernetes гарантує
            requests:
              cpu: 100m # 100 мілі-CPU (0.1 ядра)
              memory: 128Mi # 128 мегабайт RAM
            # limits — максимум, який под може використати
            limits:
              cpu: 200m # 200 мілі-CPU (0.2 ядра)
              memory: 256Mi # 256 мегабайт RAM

          # -------------------------------------------------------------------
          # VOLUME MOUNTS — монтування директорій хоста в контейнер
          # Falco потребує доступу до системних директорій для моніторингу
          # -------------------------------------------------------------------
          volumeMounts:
            # /proc — інформація про всі процеси системи
            # Falco читає звідси дані про запущені процеси
            - name: proc-fs
              mountPath: /host/proc
              readOnly: true

            # /boot — конфігурація ядра та завантажувач
            # Потрібно для визначення версії та параметрів ядра
            - name: boot-fs
              mountPath: /host/boot
              readOnly: true

            # /lib/modules — модулі ядра Linux
            # Falco може завантажувати свій kernel module звідси
            - name: lib-modules
              mountPath: /host/lib/modules
              readOnly: true

            # /usr — системні бібліотеки та утиліти
            # Потрібно для роботи з системними інструментами
            - name: usr-fs
              mountPath: /host/usr
              readOnly: true

            # /etc — конфігураційні файли системи
            # Falco читає конфіги для розуміння середовища
            - name: etc-fs
              mountPath: /host/etc
              readOnly: true

      # -------------------------------------------------------------------------
      # VOLUMES — визначення томів (що монтувати)
      # hostPath — монтує директорію з хост-системи (ноди)
      # -------------------------------------------------------------------------
      volumes:
        # /proc з хоста → /host/proc в контейнері
        - name: proc-fs
          hostPath:
            path: /proc

        # /boot з хоста → /host/boot в контейнері
        - name: boot-fs
          hostPath:
            path: /boot

        # /lib/modules з хоста → /host/lib/modules в контейнері
        - name: lib-modules
          hostPath:
            path: /lib/modules

        # /usr з хоста → /host/usr в контейнері
        - name: usr-fs
          hostPath:
            path: /usr

        # /etc з хоста → /host/etc в контейнері
        - name: etc-fs
          hostPath:
            path: /etc

      # -------------------------------------------------------------------------
      # TOLERATIONS — дозволяє запуск на "заборонених" нодах
      # Деякі ноди мають "taints" (мітки заборони)
      # Toleration каже: "Мені можна на цю ноду"
      # -------------------------------------------------------------------------
      tolerations:
        # Дозволяє запуск на control-plane нодах (master)
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
        # Старий формат для master нод
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
