# =============================================================================
# StatefulSet для Redis кластера
# StatefulSet — контролер для stateful додатків (баз даних, кешів)
# Забезпечує: стабільні імена подів, порядок запуску, персистентні диски
# =============================================================================

# Версія Kubernetes API для StatefulSet
# apps/v1 — група API для додатків (Deployment, StatefulSet, DaemonSet)
apiVersion: apps/v1

# Тип ресурсу — StatefulSet
# Чому не Deployment? Бо потрібні стабільні імена (redis-0, redis-1) та окремі диски
kind: StatefulSet

# -----------------------------------------------------------------------------
# METADATA — ідентифікація ресурсу
# -----------------------------------------------------------------------------
metadata:
  # Ім'я StatefulSet — стане префіксом для подів: redis-0, redis-1
  name: redis

# -----------------------------------------------------------------------------
# SPEC — бажаний стан StatefulSet
# -----------------------------------------------------------------------------
spec:
  # Ім'я Headless Service для DNS
  # Поди отримають адреси: redis-0.redis-headless, redis-1.redis-headless
  # ВАЖЛИВО: має співпадати з name в нашому Service!
  serviceName: redis-headless

  # Кількість реплік (подів)
  # Створить: redis-0, потім redis-1 (послідовно!)
  replicas: 2

  # Selector — як StatefulSet знаходить "свої" поди
  # Шукає поди з label app=redis
  selector:
    matchLabels:
      app: redis

  # ---------------------------------------------------------------------------
  # TEMPLATE — шаблон для створення подів
  # Кожен под буде створений за цим шаблоном
  # ---------------------------------------------------------------------------
  template:
    # Metadata для пода
    metadata:
      # Labels — мітки пода
      # ВАЖЛИВО: має співпадати з selector.matchLabels вище!
      # Також Service знайде ці поди по цьому label
      labels:
        app: redis

    # Spec пода — що всередині
    spec:
      # Список контейнерів в поді (може бути кілька, у нас один)
      containers:
        # Ім'я контейнера (для логів, exec команд)
        - name: redis

          # Docker образ
          # redis:7-alpine — Redis версії 7, легкий Alpine Linux (~30MB)
          image: redis:7-alpine

          # Порти контейнера
          ports:
            # containerPort — порт, який слухає процес Redis всередині контейнера
            - containerPort: 6379
              # name — ім'я порту для посилань в інших конфігах
              name: redis

          # Монтування volumes в контейнер
          volumeMounts:
            # name — посилання на volume з volumeClaimTemplates нижче
            - name: redis-data
              # mountPath — куди примонтувати диск в файловій системі контейнера
              # /data — стандартна директорія Redis для збереження даних
              mountPath: /data

  # ---------------------------------------------------------------------------
  # VOLUME CLAIM TEMPLATES — шаблони для створення дисків
  # Для КОЖНОГО пода автоматично створюється окремий PVC:
  #   - redis-data-redis-0 (для redis-0)
  #   - redis-data-redis-1 (для redis-1)
  # ---------------------------------------------------------------------------
  volumeClaimTemplates:
    - metadata:
        # Ім'я шаблону — стане частиною імені PVC
        # Формат PVC: {name}-{pod-name} → redis-data-redis-0
        name: redis-data

      # Специфікація PVC
      spec:
        # Режим доступу до диска
        # ReadWriteOnce — диск може бути примонтований для читання/запису
        #                 тільки до ОДНОЇ ноди одночасно
        # Інші варіанти: ReadOnlyMany, ReadWriteMany
        accessModes:
          - ReadWriteOnce

        # Запит ресурсів
        resources:
          requests:
            # Розмір диска — 1 гігабайт
            # Для тестів достатньо, в продакшені може бути 10Gi, 100Gi
            storage: 1Gi
