# ============================================================
# Docker Compose для MySQL - SchoolDB Homework
# ============================================================
# Docker Compose версія (3.8 підтримує всі сучасні функції)
version: "3.8"

# ============================================================
# SERVICES - контейнери, які будуть запущені
# ============================================================
services:
  # ----------------------------------------------------------
  # MySQL Server - основна база даних
  # ----------------------------------------------------------
  mysql:
    # Офіційний образ MySQL версії 8.0
    # Чому 8.0? Це LTS (Long Term Support) версія з усіма сучасними функціями
    image: mysql:8.0

    # Ім'я контейнера - щоб легко знаходити в docker ps
    container_name: school-mysql

    # Політика перезапуску:
    # - "no" - не перезапускати
    # - "always" - завжди перезапускати
    # - "unless-stopped" - перезапускати, якщо не зупинено вручну (оптимально для dev)
    restart: unless-stopped

    # ----------------------------------------------------------
    # ENVIRONMENT - змінні середовища для налаштування MySQL
    # ----------------------------------------------------------
    environment:
      # Пароль для root користувача (ОБОВ'ЯЗКОВО для MySQL)
      # В продакшені використовувати secrets, не hardcode!
      MYSQL_ROOT_PASSWORD: rootpassword

      # Автоматично створити базу даних при старті
      # MySQL створить цю БД ще до того, як ми підключимося
      MYSQL_DATABASE: SchoolDB

      # Створити додаткового користувача (не root)
      # Best practice: не використовувати root для додатків
      MYSQL_USER: school_admin
      MYSQL_PASSWORD: school_secret

    # ----------------------------------------------------------
    # PORTS - мапінг портів host:container
    # ----------------------------------------------------------
    # 3306 - стандартний порт MySQL
    # Лівий (3306) - порт на MacBook
    # Правий (3306) - порт всередині контейнера
    ports:
      - "3306:3306"

    # ----------------------------------------------------------
    # VOLUMES - збереження даних між перезапусками
    # ----------------------------------------------------------
    volumes:
      # Named volume для даних MySQL
      # Без цього всі дані зникнуть при docker compose down!
      - mysql_data:/var/lib/mysql

      # Монтування папки scripts для init скриптів
      # Все що в /docker-entrypoint-initdb.d/ виконається при ПЕРШОМУ запуску
      # :ro = read-only (контейнер не може змінювати ці файли)
      - ./scripts:/docker-entrypoint-initdb.d:ro

    # ----------------------------------------------------------
    # NETWORKS - мережа для комунікації між контейнерами
    # ----------------------------------------------------------
    networks:
      - school-network

    # ----------------------------------------------------------
    # HEALTHCHECK - перевірка чи MySQL готовий приймати з'єднання
    # ----------------------------------------------------------
    # Це важливо! MySQL потребує 10-30 секунд для ініціалізації
    healthcheck:
      # mysqladmin ping перевіряє чи сервер відповідає
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-prootpassword",
        ]
      # Почати перевірки через 30 секунд після старту
      start_period: 30s
      # Перевіряти кожні 10 секунд
      interval: 10s
      # Таймаут для кожної перевірки
      timeout: 5s
      # Кількість невдалих спроб до статусу "unhealthy"
      retries: 3

  # ----------------------------------------------------------
  # Adminer - легкий веб-інтерфейс для MySQL
  # ----------------------------------------------------------
  # Альтернатива phpMyAdmin, але набагато легший (~25MB vs ~200MB)
  adminer:
    image: adminer:4
    container_name: school-adminer
    restart: unless-stopped

    # Веб-інтерфейс буде доступний на http://localhost:8080
    ports:
      - "8080:8080"

    # Adminer запуститься тільки коли MySQL буде healthy
    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - school-network

# ============================================================
# VOLUMES - іменовані томи для збереження даних
# ============================================================
volumes:
  mysql_data:
    # driver: local - зберігати на локальній файловій системі
    # Docker сам визначить де зберігати (зазвичай /var/lib/docker/volumes/)
    driver: local

# ============================================================
# NETWORKS - мережі для ізоляції та комунікації
# ============================================================
networks:
  school-network:
    # bridge - стандартний драйвер для комунікації між контейнерами
    # Контейнери в одній мережі можуть звертатися один до одного по імені
    # Наприклад: adminer може підключитися до mysql по hostname "mysql"
    driver: bridge
