# ═══════════════════════════════════════════════════════════════
# DOCKER COMPOSE CONFIGURATION FILE
# ═══════════════════════════════════════════════════════════════
#
# Це YAML-файл (Yet Another Markup Language)
# YAML чутливий до відступів! Використовуй 2 пробіли, НЕ таби.
#
# Структура файлу:
# ┌─────────────────────────────────────┐
# │  services:    ← Контейнери          │
# │  volumes:     ← Персистентні дані   │
# │  networks:    ← Мережі              │
# └─────────────────────────────────────┘

services:
  # ══════════════════════════════════════════════════════════════
  # СЕРВІС: web (Nginx веб-сервер)
  # ══════════════════════════════════════════════════════════════
  web:
    # ┌─────────────────────────────────────────────────────────┐
    # │ image: — який Docker образ використовувати              │
    # │                                                         │
    # │ nginx:alpine означає:                                   │
    # │   nginx   = назва образу на Docker Hub                  │
    # │   alpine  = тег (версія) — легкий Linux (~5MB)          │
    # │                                                         │
    # │ Альтернативи:                                           │
    # │   nginx:latest  — останній стабільний (~140MB)          │
    # │   nginx:1.25    — конкретна версія                      │
    # │   nginx:alpine  — мінімальний розмір (~23MB) ✓          │
    # └─────────────────────────────────────────────────────────┘
    image:
      nginx:alpine

      # ┌─────────────────────────────────────────────────────────┐
      # │ container_name: — явне ім'я контейнера                  │
      # │                                                         │
      # │ Без цього: homework-06-docker-compose-web-1             │
      # │ З цим:     nginx-web                                    │
      # │                                                         │
      # │ ВАЖЛИВО: Забороняє масштабування (імена унікальні)      │
      # └─────────────────────────────────────────────────────────┘
    # container_name:
    #   nginx-web

      # ┌─────────────────────────────────────────────────────────┐
      # │ ports: — прокидання портів з контейнера на хост         │
      # │                                                         │
      # │ Формат: "ХОСТ:КОНТЕЙНЕР"                                │
      # │                                                         │
      # │ "8080:80" означає:                                      │
      # │                                                         │
      # │   Твій Mac         Docker контейнер                     │
      # │   ┌───────┐        ┌───────────────┐                    │
      # │   │ :8080 │◄──────►│ nginx :80     │                    │
      # │   └───────┘        └───────────────┘                    │
      # │                                                         │
      # │ Браузер → localhost:8080 → контейнер:80 → nginx         │
      # └─────────────────────────────────────────────────────────┘
    ports:
      - "8080-8082:80"

    # ┌─────────────────────────────────────────────────────────┐
    # │ volumes: — монтування даних в контейнер                 │
    # │                                                         │
    # │ Два типи:                                               │
    # │                                                         │
    # │ 1. Named Volume (керує Docker):                         │
    # │    web-data:/usr/share/nginx/html:ro                    │
    # │    ├─ web-data = ім'я тому (визначено внизу)            │
    # │    ├─ /usr/share/nginx/html = шлях В контейнері         │
    # │    └─ :ro = read-only (тільки читання)                  │
    # │                                                         │
    # │ 2. Bind Mount (файл з твого Mac):                       │
    # │    ./nginx/index.html:/usr/share/nginx/html/index.html  │
    # │    ├─ ./nginx/index.html = файл на ТВОЄМУ комп'ютері    │
    # │    └─ :/path/index.html = куди монтувати в контейнері   │
    # │                                                         │
    # │ Візуалізація:                                           │
    # │   Mac: ./nginx/index.html ──┐                           │
    # │                              ▼                          │
    # │   Container: /usr/share/nginx/html/index.html           │
    # └─────────────────────────────────────────────────────────┘
    volumes:
      - web-data:/usr/share/nginx/html:ro
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro

    # ┌─────────────────────────────────────────────────────────┐
    # │ networks: — до яких мереж підключити контейнер          │
    # │                                                         │
    # │ appnet — спільна мережа для всіх сервісів               │
    # │                                                         │
    # │ Всередині мережі контейнери бачать один одного:         │
    # │   web може звернутися до db:5432                        │
    # │   web може звернутися до cache:6379                     │
    # └─────────────────────────────────────────────────────────┘
    networks:
      - appnet

    # ┌─────────────────────────────────────────────────────────┐
    # │ depends_on: — порядок запуску сервісів                  │
    # │                                                         │
    # │ Docker Compose запустить спочатку db і cache,           │
    # │ а потім web.                                            │
    # │                                                         │
    # │ ВАЖЛИВО: Це НЕ чекає готовності сервісу!                │
    # │ Контейнер запущений ≠ сервіс готовий до роботи          │
    # │ Для цього потрібен healthcheck (додано до db і cache)   │
    # └─────────────────────────────────────────────────────────┘
    depends_on:
      - db
      - cache

    # ┌─────────────────────────────────────────────────────────┐
    # │ restart: — політика перезапуску контейнера              │
    # │                                                         │
    # │ Варіанти:                                                │
    # │   no              — ніколи не перезапускати             │
    # │   always          — завжди перезапускати               │
    # │   on-failure      — тільки при помилці                 │
    # │   unless-stopped  — завжди, окрім ручної зупинки ✓     │
    # └─────────────────────────────────────────────────────────┘
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════
  # СЕРВІС: db (PostgreSQL база даних)
  # ══════════════════════════════════════════════════════════════
  db:
    # ┌─────────────────────────────────────────────────────────┐
    # │ postgres:16-alpine                                      │
    # │                                                         │
    # │ postgres  = офіційний образ PostgreSQL                  │
    # │ 16        = версія PostgreSQL                           │
    # │ alpine    = мінімальний Linux                           │
    # │                                                         │
    # │ Розмір: ~80MB (vs ~400MB для debian версії)             │
    # └─────────────────────────────────────────────────────────┘
    image: postgres:16-alpine

    container_name: postgres-db

    # ┌─────────────────────────────────────────────────────────┐
    # │ environment: — змінні середовища                        │
    # │                                                         │
    # │ Це як .env файл у твоїх Vue/Nuxt проєктах!              │
    # │                                                         │
    # │ PostgreSQL образ читає ці змінні при першому запуску    │
    # │ і автоматично:                                          │
    # │   • Створює користувача (POSTGRES_USER)                 │
    # │   • Встановлює пароль (POSTGRES_PASSWORD)               │
    # │   • Створює базу даних (POSTGRES_DB)                    │
    # │                                                         │
    # │ В продакшні НІКОЛИ не пиши паролі в файлі!              │
    # │ Використовуй Docker Secrets або .env файл               │
    # └─────────────────────────────────────────────────────────┘
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops123
      POSTGRES_DB: myapp

    # ┌─────────────────────────────────────────────────────────┐
    # │ volumes: — персистентність даних                        │
    # │                                                         │
    # │ БЕЗ VOLUME:                                             │
    # │   docker compose down → всі дані БД втрачені!           │
    # │                                                         │
    # │ З VOLUME:                                               │
    # │   docker compose down → дані збережені                  │
    # │   docker compose up   → дані відновлені                 │
    # │                                                         │
    # │ /var/lib/postgresql/data — стандартний шлях             │
    # │ де PostgreSQL зберігає всі дані                         │
    # └─────────────────────────────────────────────────────────┘
    volumes:
      - db-data:/var/lib/postgresql/data

    networks:
      - appnet

    restart: unless-stopped

    # ┌─────────────────────────────────────────────────────────┐
    # │ healthcheck: — перевірка "живості" сервісу              │
    # │                                                         │
    # │ Проблема:                                               │
    # │   Контейнер запущений ≠ PostgreSQL готовий              │
    # │   (БД потребує часу на ініціалізацію)                   │
    # │                                                         │
    # │ Рішення:                                                │
    # │   Docker періодично запускає команду перевірки          │
    # │                                                         │
    # │ pg_isready — утиліта PostgreSQL                         │
    # │   -U devops   = перевірити від імені користувача        │
    # │   -d myapp    = перевірити базу даних                   │
    # │                                                         │
    # │ interval: 10s  — перевіряти кожні 10 секунд             │
    # │ timeout: 5s    — чекати відповідь 5 секунд              │
    # │ retries: 5     — 5 невдач = контейнер unhealthy         │
    # └─────────────────────────────────────────────────────────┘
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d myapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ══════════════════════════════════════════════════════════════
  # СЕРВІС: cache (Redis кеш-сервер)
  # ══════════════════════════════════════════════════════════════
  #
  # Що таке Redis?
  # ┌─────────────────────────────────────────────────────────┐
  # │ Redis = In-Memory Database (база даних в оперативці)    │
  # │                                                         │
  # │ PostgreSQL:  Диск 💾  → Повільно, але надійно          │
  # │ Redis:       RAM 🧠   → Дуже швидко, але volatile       │
  # │                                                         │
  # │ Використання:                                           │
  # │   • Кешування (зберегти результат запиту)              │
  # │   • Сесії користувачів                                  │
  # │   • Черги задач                                         │
  # │   • Real-time дані                                      │
  # └─────────────────────────────────────────────────────────┘
  cache:
    image: redis:7-alpine

    container_name: redis-cache

    # ┌─────────────────────────────────────────────────────────┐
    # │ Зверни увагу: НЕМАЄ volumes!                            │
    # │                                                         │
    # │ Кеш за визначенням — тимчасові дані.                    │
    # │ Якщо Redis перезапуститься — кеш очиститься.            │
    # │ Це нормально! Додаток просто перекешує дані.            │
    # │                                                         │
    # │ (В продакшні можна додати volume для persistence)       │
    # └─────────────────────────────────────────────────────────┘

    networks:
      - appnet

    restart: unless-stopped

    # ┌─────────────────────────────────────────────────────────┐
    # │ healthcheck для Redis                                   │
    # │                                                         │
    # │ redis-cli ping — надсилає PING команду                  │
    # │ Очікувана відповідь: PONG                               │
    # │                                                         │
    # │ Якщо PONG — Redis працює                                │
    # │ Якщо тиша — Redis мертвий                               │
    # └─────────────────────────────────────────────────────────┘
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ══════════════════════════════════════════════════════════════
# VOLUMES — Персистентне зберігання даних
# ══════════════════════════════════════════════════════════════
#
# Аналогія:
# ┌─────────────────────────────────────────────────────────┐
# │                                                         │
# │   Контейнер = Квартира, що орендуєш                     │
# │   Volume    = Сейф у банку (залишається назавжди)       │
# │                                                         │
# │   Виїхав з квартири (docker down) → речі в сейфі        │
# │   Нова квартира (docker up)       → забрав з сейфу      │
# │                                                         │
# └─────────────────────────────────────────────────────────┘

volumes:
  # ┌─────────────────────────────────────────────────────────┐
  # │ db-data: — том для PostgreSQL                           │
  # │                                                         │
  # │ Зберігає:                                               │
  # │   • Всі таблиці                                         │
  # │   • Індекси                                             │
  # │   • Конфігурацію БД                                     │
  # │                                                         │
  # │ Фізично на Mac:                                         │
  # │ /var/lib/docker/volumes/homework-06_db-data/_data       │
  # └─────────────────────────────────────────────────────────┘
  db-data:
    driver: local # Зберігати локально на диску

  # ┌─────────────────────────────────────────────────────────┐
  # │ web-data: — том для Nginx                               │
  # │                                                         │
  # │ Може зберігати:                                         │
  # │   • Статичні файли                                      │
  # │   • Логи                                                │
  # │   • Конфігурацію                                        │
  # │                                                         │
  # │ В нашому випадку: майже порожній (ми використовуємо     │
  # │ bind mount для index.html)                              │
  # └─────────────────────────────────────────────────────────┘
  web-data:
    driver: local

# ══════════════════════════════════════════════════════════════
# NETWORKS — Мережева конфігурація
# ══════════════════════════════════════════════════════════════

networks:
  # ┌─────────────────────────────────────────────────────────┐
  # │ appnet: — спільна мережа для всіх сервісів              │
  # │                                                         │
  # │ driver: bridge                                          │
  # │                                                         │
  # │ Bridge — це віртуальний свіч:                           │
  # │                                                         │
  # │         ┌──────────────────────┐                       │
  # │         │    Bridge (appnet)   │                       │
  # │         │    172.18.0.1        │                       │
  # │         └──┬───────┬───────┬───┘                       │
  # │            │       │       │                            │
  # │          web      db    cache                          │
  # │         .0.2     .0.3    .0.4                          │
  # │                                                         │
  # │ Всі підключені контейнери можуть спілкуватися          │
  # └─────────────────────────────────────────────────────────┘
  appnet:
    driver: bridge
